<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <style>
    body {
      margin: 0px;
      background: #867575;
    }
    section {
      display: flex;
      margin: 12px;
      background: #5f2626;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: space-between;
    }
    section div {
      background: #eee9e9;
      color: black;
      flex: 0 0 calc(20% - 10px);
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 20px;
      width: 250px;
      height: 350px;
      padding: 10px 25px;
      box-sizing: border-box;
      margin-bottom: 80px;
    }
    header {
      background: #4e415a;
      font:
        25px Arial,
        Helvetica,
        sans-serif;
      border-radius: 30px;
      display: flex;
      justify-content: space-between;
    }
    header nav {
      display: flex;
      gap: 12px;
    }
    header nav a {
      text-decoration: none;
      color: white;
      font-weight: bold;
      padding: 17px;
    }
    header nav a:hover {
      color: #0c0116;
    }
    span {
      color: rgb(238, 230, 230);
      padding: 17px;
    }

    @media (max-width: 771px) {
      header {
        flex-direction: column;
      }
      header nav {
        display: flex;
        justify-content: space-between;
        gap: 0;
      }
      header nav a {
        font-weight: bold;
        font-size: 12px;
      }
    }
  </style>
  <body>
    <header>
      <span>LOGO</span>
      <nav>
        <a href="#">Home</a>
        <a href="#">About</a>
        <a href="#">Services</a>
        <a href="#">Contact</a>
        <a href="#">Career</a>
        <!-- <a href="#">ContactC</a> -->

    </header>
