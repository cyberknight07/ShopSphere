<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AlignItems vs JustifyContent</title>

    <style>
      /* Global reset */
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
        font-family:
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          sans-serif;
      }

      body {
        background: linear-gradient(135deg, #f5f7fa, #c3cfe2);
        padding: 40px;
        display: flex;
        flex-direction: column;
        gap: 32px;
      }

      /* Shared container styles */
      .container {
        display: flex;
        gap: 16px;
        padding: 24px;
        height: 300px;
        border-radius: 16px;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.15);
      }

      /* Row (main axis = horizontal) */
      .row {
        justify-content: center;
        align-items: center;
        background: linear-gradient(135deg, #89f7fe, #66a6ff);
      }

      /* Column (main axis = vertical) */
      .column {
        flex-direction: column;
        justify-content: center;
        align-items: center;
        background: linear-gradient(135deg, #ff9a9e, #fad0c4);
      }

      /* Items */
      .item {
        display: flex;
        justify-content: center;
        align-items: center;
        color: #fff;
        font-weight: 600;
        border-radius: 12px;
        box-shadow: 0 6px 12px rgba(0, 0, 0, 0.2);
        background: linear-gradient(135deg, #667eea, #764ba2);
      }

      .item-one {
        width: 50px;
        height: 50px;
      }

      .item-two {
        width: 80px;
        height: 80px;
      }

      .item-three {
        width: 30px;
        height: 30px;
      }
    </style>
  </head>

  <body>
    <div class="container row">
      <div class="item item-one">A</div>
      <div class="item item-two">B</div>
      <div class="item item-three">C</div>
    </div>

    <div class="container column">
      <div class="item item-one">A</div>
      <div class="item item-two">B</div>
      <div class="item item-three">C</div>
    </div>
  </body>
</html>
