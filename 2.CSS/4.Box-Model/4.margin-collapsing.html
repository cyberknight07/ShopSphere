<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Margin Collapsing</title>

    <style>
      body {
        margin: 0;
      }

      header {
        background-color: lightgreen;
        margin-bottom: 30px;
        padding: 10px;
      }
      .box1 {
        width: 200px;
        height: 100px;
        background-color: lightblue;
        margin: 20px;
        padding: 5px;
      }

      .box2 {
        width: 200px;
        height: 100px;
        background-color: lightcoral;
        margin: 20px;
      }
    </style>
  </head>
  <body>
    <div class="box1">Box 1</div>
    <div class="box2">Box 2</div>

    <header>
      <h1>Welcome</h1>
    </header>
  </body>
</html>
