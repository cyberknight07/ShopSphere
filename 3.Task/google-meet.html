<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Meet Preview</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, Helvetica, sans-serif;
            background: #f1f3f4;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            background: white;
            width: 520px;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.15);
            text-align: center;
        }

        h2 {
            margin-top: 0;
        }

        .video-box {
            background: black;
            height: 300px;
            border-radius: 10px;
            overflow: hidden;
            position: relative;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .error {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: #d93025;
            color: white;
            padding: 10px;
            font-size: 14px;
            display: none;
        }

        .controls {
            margin-top: 20px;
            display: flex;
            justify-content: center;
            gap: 12px;
        }

        button {
            padding: 10px 16px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            background: #1a73e8;
            color: white;
        }

        button:hover {
            opacity: .9;
        }

        button.off {
            background: #ea4335;
        }
    </style>
</head>

<body>

    <div class="container">

        <h2>Ready to join?</h2>

        <div class="video-box">
            <video id="video" autoplay playsinline muted></video>
            <div id="error" class="error"></div>
        </div>

        <div class="controls">

            <button id="camBtn">Camera On</button>
            <button id="micBtn">Mic On</button>
            <button id="retryBtn">Retry Permission</button>

        </div>

    </div>

    <script>

        const video = document.getElementById("video")
        const errorBox = document.getElementById("error")

        const camBtn = document.getElementById("camBtn")
        const micBtn = document.getElementById("micBtn")
        const retryBtn = document.getElementById("retryBtn")

        let stream
        let camEnabled = true
        let micEnabled = true

        async function startMedia() {

            try {

                stream = await navigator.mediaDevices.getUserMedia({
                    video: true,
                    audio: true
                })

                video.srcObject = stream
                errorBox.style.display = "none"

            } catch (err) {

                errorBox.innerText = "Camera/Microphone permission denied. Please allow access."
                errorBox.style.display = "block"

            }

        }

        camBtn.onclick = () => {

            if (!stream) return

            camEnabled = !camEnabled
            stream.getVideoTracks()[0].enabled = camEnabled

            camBtn.textContent = camEnabled ? "Camera On" : "Camera Off"
            camBtn.classList.toggle("off")

        }

        micBtn.onclick = () => {

            if (!stream) return

            micEnabled = !micEnabled
            stream.getAudioTracks()[0].enabled = micEnabled

            micBtn.textContent = micEnabled ? "Mic On" : "Mic Off"
            micBtn.classList.toggle("off")

        }

        retryBtn.onclick = () => {

            startMedia()

        }

        startMedia()

    </script>

</body>

</html>
