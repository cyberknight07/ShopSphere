<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Speaking While Muted Demo</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: #f5f5f5;
            text-align: center;
        }

        h1 {
            margin-bottom: 20px;
        }

        #indicator {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            background-color: gray;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 20px;
            color: white;
            transition: background-color 0.2s ease;
        }

        #status {
            margin-top: 15px;
            font-weight: bold;
        }
    </style>
</head>

<body>

    <h1>Speaking While Muted Demo</h1>
    <div id="indicator">Muted</div>
    <div id="status">Not Speaking</div>

    <script>
        async function startVoiceDetection() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                const audioContext = new (window.AudioContext || window.webkitAudioContext)();
                const source = audioContext.createMediaStreamSource(stream);
                const analyser = audioContext.createAnalyser();
                analyser.fftSize = 512;
                source.connect(analyser);

                const data = new Uint8Array(analyser.frequencyBinCount);
                const indicator = document.getElementById('indicator');
                const status = document.getElementById('status');

                function detectVoice() {
                    analyser.getByteTimeDomainData(data);

                    // Calculate average volume
                    let sum = 0;
                    for (let i = 0; i < data.length; i++) {
                        sum += Math.abs(data[i] - 128);
                    }
                    const volume = sum / data.length;

                    // Threshold for detecting speech
                    if (volume > 10) { // tweak threshold as needed
                        indicator.style.backgroundColor = 'red';
                        status.textContent = 'Speaking!';
                    } else {
                        indicator.style.backgroundColor = 'gray';
                        status.textContent = 'Not Speaking';
                    }

                    requestAnimationFrame(detectVoice);
                }

                detectVoice();
            } catch (err) {
                console.error('Microphone access denied or not available.', err);
                alert('Error: Please allow microphone access.');
            }
        }

        // Start detection on page load
        startVoiceDetection();
    </script>

</body>

</html>
