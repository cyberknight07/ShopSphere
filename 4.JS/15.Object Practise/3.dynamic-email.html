<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Email Template Generator</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f5f5f5;
            margin: 40px;
        }

        .container {
            max-width: 500px;
            margin: auto;
            background: #fff;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }

        input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border: 1px solid #ccc;
            border-radius: 4px;
        }

        button {
            padding: 10px 15px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            margin-right: 10px;
        }

        .generate-btn {
            background: #007bff;
            color: white;
        }

        .reset-btn {
            background: #6c757d;
            color: white;
        }

        button:hover {
            opacity: 0.9;
        }

        .preview {
            margin-top: 20px;
            padding: 20px;
            border: 1px solid #ddd;
            background: #fafafa;
            border-radius: 6px;
            display: none;
        }

        /* Chrome, Safari, Edge, Opera */
        input[type="number"]::-webkit-outer-spin-button,
        input[type="number"]::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }

        /* Firefox */
        input[type="number"] {
            -moz-appearance: textfield;
        }
    </style>
</head>

<body>

    <div class="container">
        <h2>Email Template Generator</h2>

        <input type="text" id="name" placeholder="Enter Name (optional)">
        <input type="email" id="email" placeholder="Enter Email">
        <input type="number" id="otp" placeholder="Enter OTP">

        <button class="generate-btn" onclick="handleGenerateTemplate()">Generate</button>
        <button class="reset-btn" onclick="handleReset()">Reset</button>

        <div class="preview" id="previewBox"></div>
    </div>

    <script>

        function generateEmailTemplate({
            name = "there",
            email = "Not Provided",
            otp = "000000"
        } = {}) {

            return `
                <div style="font-family: Arial, sans-serif; max-width: 500px; margin:auto; background:#ffffff; border-radius:8px; padding:20px; border:1px solid #eee;">
                    
                    <h2 style="margin-bottom:10px;">Hello, NAME!</h2>

                    <p style="color:#555; margin-bottom:20px;">
                        Your registered email: <strong>EMAIL</strong>
                    </p>

                    <div style="
                        text-align:center;
                        margin: 25px 0;
                    ">
                        <p style="margin-bottom:8px; color:#666;">Your One-Time Password</p>

                        <div style="
                            display:inline-block;
                            padding: 12px 20px;
                            font-size: 26px;
                            letter-spacing: 6px;
                            font-weight: bold;
                            color: #333;
                            border: 2px dashed #007bff;
                            border-radius: 6px;
                            background: #f8fbff;
                        ">
                            OTP
                        </div>
                    </div>

                    <p style="margin-top:20px;">
                        Please use this OTP to complete your verification.
                    </p>

                    <p style="font-size:12px; color:#888;">
                        This OTP is valid for a limited time. Do not share it with anyone.
                    </p>

                </div>
            `;
        }

        function handleGenerateTemplate() {
            const name = document.getElementById("name").value.trim();
            const email = document.getElementById("email").value.trim();
            const otp = document.getElementById("otp").value.trim();

            if (!email || !otp) {
                alert("Email and OTP are required!");
                return;
            }

            const template = generateEmailTemplate({
                name,
                email,
                otp
            });

            const previewBox = document.getElementById("previewBox");
            previewBox.innerHTML = template;
            previewBox.style.display = "block";
        }


    </script>

</body>

</html>
